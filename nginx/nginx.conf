# Внутренний DNS Docker
# Обязателен, чтобы Nginx находил контейнеры по именам сервисов уже после запуска (в момент использования переменной)
resolver 127.0.0.11 valid=30s;

server {
    listen 80;											# Слушаем HTTP
    listen 443 ssl;										# Слушаем HTTPS, включаем шифрование SSL/TLS
    http2 on;											# Активируем поддержку протокола HTTP/2 для всего сервера
    server_name localhost;								# Домен

    ssl_certificate     /etc/nginx/certs/fullchain.pem;	# Путь к файлу публичного сертификата внутри контейнера Nginx
    ssl_certificate_key /etc/nginx/certs/privkey.pem;	# Путь к файлу закрытого ключа

    # Приложение
    location / {
        # Используем переменную, чтобы Nginx не падал при старте, если app еще не запущен
        set $upstream_app http://app:8080;

        proxy_pass         $upstream_app;				# Проброс запроса на внутренний порт 8080
        proxy_http_version 1.1;							# Протокол HTTP 1.1 (необходимо для WebSockets и SignalR)
        proxy_set_header   Upgrade $http_upgrade;		# Нужно для WebSockets
        proxy_set_header   Connection keep-alive;		# Нужно для WebSockets
        proxy_set_header   Host $host;					# Передаём оригинальный заголовок хоста
        proxy_cache_bypass $http_upgrade;				# Отключаем кэширование запросов обновления (WebSockets)
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;	# Передаём приложению реальный IP-адрес клиента
        proxy_set_header   X-Forwarded-Proto $scheme;	# Передаём приложению протокол для UseHttpsRedirection
    }

    # Grafana
    location /grafana/ {
        proxy_pass         http://grafana:3000;			# Без слеша в конце, если GF_SERVER_SERVE_FROM_SUB_PATH=true
        proxy_set_header   Host $host;
    }

    # Seq
    location /seq/ {
        proxy_pass         http://seq:80/;				# Со слешем в конце
        proxy_set_header   Host $host;
    }
}
