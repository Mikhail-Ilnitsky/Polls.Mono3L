name: Docker Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  checks: write

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем код в рабочую директорию GitHub Actions runner'а
        uses: actions/checkout@v4

      - name: Устанавливаем .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Восстанавливаем NuGet-пакеты из кэша
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Скачиваем и устанавливаем недостающие NuGet-пакеты
        run: dotnet restore Ilnitsky.Polls.Mono3L.sln

      - name: Сборка решения
        run: dotnet build Ilnitsky.Polls.Mono3L.sln --no-restore --configuration Release

      - name: Сохраняем собранное решение (bin и obj папки)
        uses: actions/upload-artifact@v4
        with:
          name: compiled-app
          path: |
            ./
            !./.git
            !**/node_modules
          retention-days: 1

  run-xunit-tests:
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем репозиторий, чтобы dorny/test-reporter имел доступ к хэшам коммитов git-а
        uses: actions/checkout@v4

      - name: Скачиваем уже собранное решение
        uses: actions/download-artifact@v4
        with:
          name: compiled-app

      - name: Устанавливаем .NET SDK и настраиваем окружение для запуска тестов
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Запуск тестов xUnit
        run: |
          dotnet test Ilnitsky.Polls.Tests.XUnit/Ilnitsky.Polls.Tests.XUnit.csproj \
          --no-build \
          --configuration Release \
          --verbosity normal \
          --logger "console;verbosity=detailed" \
          --logger "trx;LogFileName=xunit-test-results.trx" \
          --results-directory ./TestResults \
          --collect:"Code Coverage;Format=Cobertura" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests*]*"

      - name: Загружаем результаты тестов как артефакты
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xunit-test-results-${{ github.run_number }}
          path: '**/TestResults/*.trx'
          retention-days: 7

      - name: Публикуем отчёт по тестам в GitHub Pages
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests Results
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx

      - name: Создаём Summary покрытия тестами
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: './TestResults/**/coverage.cobertura.xml'
          badge: true
          format: markdown
          output: both
          thresholds: '40 75'
          fail_below_min: true  

      - name: Выводим Summary покрытия тестами
        if: always()
        run: |
          ls -R ./TestResults # Для отладки смотрим содержимое папки
          if [ -f code-coverage-results.md ]; then
            cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Файл покрытия не найден" >> $GITHUB_STEP_SUMMARY
          fi

  run-nunit-tests:
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем репозиторий, чтобы dorny/test-reporter имел доступ к хэшам коммитов git-а
        uses: actions/checkout@v4

      - name: Скачиваем уже собранное решение
        uses: actions/download-artifact@v4
        with:
          name: compiled-app

      - name: Устанавливаем .NET SDK и настраиваем окружение для запуска тестов
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Запуск тестов NUnit
        run: |
          dotnet test Ilnitsky.Polls.Tests.NUnit/Ilnitsky.Polls.Tests.NUnit.csproj \
          --no-build \
          --configuration Release \
          --verbosity normal \
          --logger "console;verbosity=detailed" \
          --logger "trx;LogFileName=nunit-test-results.trx"

      - name: Загружаем результаты тестов как артефакты
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nunit-test-results-${{ github.run_number }}
          path: '**/TestResults/*.trx'
          retention-days: 7

      - name: Публикуем отчёт по тестам в GitHub Pages
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: NUnit Tests Results
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
  
  build-image-and-push:
    runs-on: ubuntu-latest
    needs: [run-xunit-tests, run-nunit-tests]
    steps:
      - name: Клонируем код в рабочую директорию GitHub Actions runner'а
        uses: actions/checkout@v4

      - name: Собираем docker-образ
        run: docker build -f Ilnitsky.Polls/Dockerfile -t polls .

      - name: Входим в GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Отправляем образ в GHCR с тегом 'latest'
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:latest
          # Отправляем в GHCR
          docker push $IMAGE_NAME:latest

      - name: Отправляем образ в GHCR с тегом 'хэш-коммита'
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:${{ github.sha }}
          # Отправляем в GHCR
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Отправляем образ в GHCR с тегом версии
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:${{ github.ref_name }}
          # Отправляем в GHCR
          docker push $IMAGE_NAME:${{ github.ref_name }}
