name: Docker Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  checks: write

jobs:
  build-app-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем код в рабочую директорию GitHub Actions runner'а
        uses: actions/checkout@v4

      - name: Устанавливаем .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Восстанавливаем NuGet-пакеты из кэша
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Скачиваем и устанавливаем недостающие NuGet-пакеты
        run: dotnet restore Ilnitsky.Polls.Mono3L.sln

      - name: Сборка решения
        run: dotnet build Ilnitsky.Polls.Mono3L.sln --no-restore --configuration Release

      - name: Запуск тестов xUnit
        run: |
          dotnet test Ilnitsky.Polls.Tests.XUnit/Ilnitsky.Polls.Tests.XUnit.csproj \
          --no-build --configuration Release \
          --verbosity normal \
          --logger "console;verbosity=detailed" \
          --logger "trx;LogFileName=xunit-test-results.trx"

      - name: Загрузка результатов тестов как артефактов
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xunit-test-results-${{ github.run_number }}
          path: '**/TestResults/*.trx'
          retention-days: 7

      - name: Публикуем отчёт в GitHub Pages
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
  
  build-image-and-push:
    runs-on: ubuntu-latest
    needs: build-app-and-test
    steps:
      - name: Клонируем код в рабочую директорию GitHub Actions runner'а
        uses: actions/checkout@v4

      - name: Собираем docker-образ
        run: docker build -f Ilnitsky.Polls/Dockerfile -t polls .

      - name: Входим в GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Отправляем образ в GHCR с тегом 'latest'
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:latest
          # Отправляем в GHCR
          docker push $IMAGE_NAME:latest

      - name: Отправляем образ в GHCR с тегом 'хэш-коммита'
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:${{ github.sha }}
          # Отправляем в GHCR
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Отправляем образ в GHCR с тегом версии
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:${{ github.ref_name }}
          # Отправляем в GHCR
          docker push $IMAGE_NAME:${{ github.ref_name }}
