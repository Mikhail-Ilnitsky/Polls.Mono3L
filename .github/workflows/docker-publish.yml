name: Docker Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем код в рабочую директорию GitHub Actions runner'а
        uses: actions/checkout@v4

      - name: Собираем docker-образ
        run: docker build -f Ilnitsky.Polls/Dockerfile -t polls .

      - name: Входим в GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Отправляем образ в GHCR с тегом 'latest'
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:latest
          # Отправляем в GHCR
          docker push $IMAGE_NAME:latest

      - name: Отправляем образ в GHCR с тегом 'хэш-коммита'
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:${{ github.sha }}
          # Отправляем в GHCR
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Отправляем образ в GHCR с тегом версии
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Получаем официальное имя образа для GitHub в нижнем регистре
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Присваиваем образу имя и тег
          docker tag polls $IMAGE_NAME:${{ github.ref_name }}
          # Отправляем в GHCR
          docker push $IMAGE_NAME:${{ github.ref_name }}
