name: Docker Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем код в рабочую директорию GitHub Actions runner'а
        uses: actions/checkout@v4

      - name: Собираем docker-образ
        run: docker build -f Ilnitsky.Polls/Dockerfile -t polls .

      - name: Входим в GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Отправляем образ в GHCR с тегами 'latest' и 'хэш-коммита'
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Присваиваем образу официальное имя GitHub и нужные теги
          docker tag polls ghcr.io/${{ github.repository }}:latest
          docker tag polls ghcr.io/${{ github.repository }}:${{ github.sha }}
          # Отправляем в GHCR
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Отправляем образ в GHCR с тегом версии
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag polls ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
