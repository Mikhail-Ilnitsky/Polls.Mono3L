global:
    scrape_interval: 15s                            # Как часто собирать метрики

scrape_configs:
  # Метрики самого Prometheus (самодиагностика)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Метрики ASP.NET Core приложения
  - job_name: 'pools-app'
    static_configs:
      - targets: ['app:8080']                       # Адрес приложения и порт, где висит /metrics
